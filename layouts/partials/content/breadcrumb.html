<div id="breadcrumb" class="max-w-7xl mx-auto py-8">
  <ul class="flex space-x-2 md:space-x-4 text-sm text-zinc-500 dark:text-text-dimmed-secondary">
    {{- if .Ancestors }}
      {{- range .Ancestors.Reverse }}
      <li class="after:content-['❯'] after:ml-2 md:after:ml-4 after:opacity-30 last:after:content-none">
        <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      </li>
      {{- end }}
    {{- else }}
      <!-- For pages without ancestors (like about, copyright, etc.) -->
      <li class="after:content-['❯'] after:ml-2 md:after:ml-4 after:opacity-30">
        <a href="{{ .Site.BaseURL }}">Home</a>
      </li>
    {{- end }}
    <!-- Always show current page -->
    <li class="active last:after:content-none">
      <span>{{ .LinkTitle }}</span>
    </li>
  </ul>
</div>
