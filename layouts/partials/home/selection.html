<section class="mb-16">

    {{- $ctx := .ctx -}}
    {{- $cat := .cat -}}

    <div class="flex items-center mb-6">

      <h2 class="text-3xl md:text-4xl font-bold mr-auto">Selection Post</h2>

      <a class="border border-gray-200 dark:border-border-dimmed-primary rounded-full py-2 px-4 md:px-6 hover:bg-blue-100 dark:hover:bg-bg-dimmed-subtle" href="{{ printf "/categories/%s" $cat | absURL }}">View All</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-10">

    {{ range where $ctx.Site.RegularPages "Params.categories" "intersect" (slice $cat ) | first 3 }}
      {{- partial "content/card" . -}}

    {{ end }}

    </div>

</section>
